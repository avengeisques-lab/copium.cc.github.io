<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Portal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f0f12;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
            background: #16161a;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid #24242b;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #7289da;
            margin-bottom: 10px;
        }
        p {
            color: #9494a6;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px 0;
            margin: 10px 0;
            background-color: #7289da;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #5b73c7;
        }
        .btn-secondary {
            background-color: #24242b;
            border: 1px solid #3f3f46;
        }
        .btn-secondary:hover {
            background-color: #2e2e38;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Software Portal</h1>
        <p>Access your dashboard or download the latest client build below.</p>
        
        <a href="#" class="btn">Download Loader</a>
        
        <a href="#" class="btn btn-secondary">Account Dashboard</a>
    </div>

</body>
</html>
