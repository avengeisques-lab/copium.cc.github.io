<!DOCTYPE html>
<html>
<head>
  <title>Copium.cc</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #050505;
      color: white;
      overflow-x: hidden;
    }

    /* animated gradient bg */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, #ff2d8d33, transparent 40%);
      animation: moveBg 10s linear infinite;
      z-index: 0;
    }

    @keyframes moveBg {
      0% { transform: translate(-25%, -25%); }
      50% { transform: translate(-10%, -10%); }
      100% { transform: translate(-25%, -25%); }
    }

    .cursor {
      position: fixed;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,0,150,0.2), transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    .header {
      text-align: center;
      padding: 30px;
      font-size: 32px;
      position: relative;
      z-index: 2;
    }

    .account {
      position: absolute;
      top: 20px;
      right: 30px;
      color: #aaa;
      cursor: pointer;
      z-index: 2;
      transition: 0.3s;
    }

    .account:hover {
      color: white;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 40px;
      z-index: 2;
      position: relative;
    }

    .card {
      background: rgba(20,20,20,0.9);
      padding: 25px;
      width: 280px;
      border-radius: 16px;
      text-align: center;
      transition: 0.3s;
      transform-style: preserve-3d;
    }

    .card:hover {
      transform: scale(1.05) rotateX(5deg) rotateY(-5deg);
      box-shadow: 0 0 30px rgba(255,0,150,0.5);
    }

    .title {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .price {
      margin-bottom: 15px;
      color: #bbb;
    }

    .btn {
      padding: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: linear-gradient(45deg, #ff2d8d, #6a00ff);
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #ff2d8d;
    }

    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: #111;
      padding: 30px;
      border-radius: 10px;
      transition: 0.3s;
      z-index: 3;
    }

    .popup.show {
      transform: translate(-50%, -50%) scale(1);
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 80%;
      background: #222;
      border: none;
      color: white;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #111;
      padding: 15px 25px;
      border-radius: 8px;
      opacity: 0;
      transition: 0.3s;
      z-index: 3;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="header">Copium.cc External</div>
<div class="account" id="account" onclick="openLogin()">Login</div>

<div class="container">

  <div class="card">
    <div class="title">1 Week</div>
    <div class="price">$3</div>
    <button class="btn" onclick="buy()">Buy</button>
  </div>

  <div class="card">
    <div class="title">1 Month</div>
    <div class="price">$10</div>
    <button class="btn" onclick="buy()">Buy</button>
  </div>

  <div class="card">
    <div class="title">Lifetime</div>
    <div class="price">$20</div>
    <button class="btn" onclick="buy()">Buy</button>
  </div>

</div>

<div id="popup" class="popup">
  <h3>Login</h3>
  <input id="user" placeholder="Username"><br>
  <input type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<div id="toast" class="toast"></div>

<script>
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}

function openLogin(){
  document.getElementById("popup").classList.add("show");
}

function login(){
  const u = document.getElementById("user").value || "User";
  localStorage.setItem("logged","1");
  localStorage.setItem("user",u);
  document.getElementById("account").innerText = u;
  document.getElementById("popup").classList.remove("show");
  showToast("Logged in");
}

function buy(){
  if(!localStorage.getItem("logged")){
    showToast("You need to login to buy first!");
    return;
  }

  showToast("Redirecting...");
  setTimeout(()=>{
    window.location.href = "https://discord.gg/2Nqb9ASA";
  },1000);
}

window.onload = () => {
  if(localStorage.getItem("logged")){
    document.getElementById("account").innerText =
      localStorage.getItem("user");
  }
};
</script>

</body>
</html>
