<!DOCTYPE html>
<html>
<head>
  <title>Copium.cc</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #070707;
      color: white;
      overflow-x: hidden;
    }

    .header {
      text-align: center;
      padding: 30px;
      font-size: 30px;
    }

    .account {
      position: absolute;
      top: 20px;
      right: 30px;
      color: #aaa;
      cursor: pointer;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 40px;
    }

    .card {
      background: #141414;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    button {
      padding: 10px;
      background: #5865F2;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">Copium.cc External</div>
<div class="account" onclick="_0xlogin()">Login</div>

<div class="container">
  <div class="card">
    <h2>1 Week - $3</h2>
    <button onclick="_0xbuy()">Buy</button>
  </div>

  <div class="card">
    <h2>1 Month - $10</h2>
    <button onclick="_0xbuy()">Buy</button>
  </div>

  <div class="card">
    <h2>Lifetime - $20</h2>
    <button onclick="_0xbuy()">Buy</button>
  </div>
</div>

<script>
/* BLOCK BASIC INSPECT */
document.addEventListener("contextmenu", e => e.preventDefault());
document.onkeydown = function(e){
  if(e.keyCode==123 || (e.ctrlKey && e.keyCode==85)){
    return false;
  }
};

/* SIMPLE OBFUSCATION */
function _0xmsg(x){alert(x)}

/* LOGIN */
function _0xlogin(){
  let u = prompt("Username");
  if(u){
    localStorage.setItem("l","1");
    document.querySelector(".account").innerText = u;
  }
}

/* BUY */
function _0xbuy(){
  if(!localStorage.getItem("l")){
    _0xmsg("You need to login to buy first!");
    return;
  }

  _0xmsg("Redirecting...");
  setTimeout(()=>{
    location.href="https://discord.gg/2Nqb9ASA";
  },1000);
}

/* DEVTOOLS DETECT */
setInterval(()=>{
  if(window.outerWidth - window.innerWidth > 160){
    document.body.innerHTML = "";
  }
},1000);
</script>

</body>
</html>
