<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Software Portal</title>
    <style>
        /* Base Reset & Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #1a1a24 0%, #0a0a0f 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Entry Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glowPulse {
            0% { border-color: rgba(114, 137, 218, 0.3); box-shadow: 0 0 15px rgba(114, 137, 218, 0.1); }
            50% { border-color: rgba(114, 137, 218, 0.6); box-shadow: 0 0 25px rgba(114, 137, 218, 0.3); }
            100% { border-color: rgba(114, 137, 218, 0.3); box-shadow: 0 0 15px rgba(114, 137, 218, 0.1); }
        }

        /* Container Card */
        .card {
            background: rgba(22, 22, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(114, 137, 218, 0.3);
            padding: 50px 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 440px;
            text-align: center;
            animation: fadeIn 1s ease-out forwards, glowPulse 4s infinite ease-in-out;
        }

        /* Typography & Elements */
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #7289da, #99aab5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(46, 204, 113, 0.1);
            color: #2ecc71;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 24px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 8px #2ecc71;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        p {
            color: #a3a3c2;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* Animated Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            position: relative;
            display: block;
            width: 100%;
            padding: 14px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 8px;
            background: #7289da;
            border: none;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(114, 137, 218, 0.2);
        }

        .btn:hover {
            background: #637bcf;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(114, 137, 218, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }

        /* Subtle Background Particle Layer */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(114, 137, 218, 0.05) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card">
        <div class="status-badge">
            <div class="status-dot"></div>
            Operational
        </div>
        
        <h1>NEXUS PORTAL</h1>
        <p>Welcome back. Download the secure desktop client or authenticate your license keys via the dashboard below.</p>
        
        <div class="btn-group">
            <a href="#" class="btn">Download Client</a>
            <a href="#" class="btn btn-secondary">KeyAuth Dashboard</a>
        </div>
    </div>

</body>
</html>
