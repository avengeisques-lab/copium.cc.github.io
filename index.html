<!DOCTYPE html>
<html>
<head>
  <title>Copium.cc</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #070707;
      color: white;
      overflow-x: hidden;
    }

    .cursor-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255,0,150,0.15), transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 0;
    }

    .header {
      text-align: center;
      padding: 30px;
      font-size: 30px;
    }

    .login-bar {
      text-align: center;
      margin-top: 10px;
    }

    .login-btn {
      background: #ff2d8d;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      padding: 40px;
    }

    .card {
      background: rgba(20,20,20,0.9);
      padding: 25px;
      width: 300px;
      border-radius: 16px;
      text-align: center;
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.03);
      box-shadow: 0 0 25px rgba(255, 0, 150, 0.4);
    }

    .tag {
      background: linear-gradient(45deg, #ff2d8d, #6a00ff);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      display: inline-block;
      margin-bottom: 10px;
    }

    .title {
      font-size: 20px;
    }

    .features {
      color: #aaa;
      margin: 15px 0;
    }

    .price {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .btn {
      background: #5865F2;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(20,20,20,0.95);
      padding: 15px 25px;
      border-radius: 8px;
      opacity: 0;
      transition: 0.3s;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Login popup */
    .popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: #111;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      transition: 0.3s;
      z-index: 999;
    }

    .popup.show {
      transform: translate(-50%, -50%) scale(1);
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 80%;
      background: #222;
      border: none;
      color: white;
    }

  </style>
</head>

<body>

<div class="cursor-glow" id="glow"></div>

<div class="header">Copium.cc External</div>

<div class="login-bar">
  <button class="login-btn" onclick="openLogin()">Login</button>
</div>

<div class="container">

  <div class="card">
    <div class="tag">Starter</div>
    <div class="title">1 Week</div>
    <div class="features">7 days access</div>
    <div class="price">$3</div>
    <button class="btn" onclick="buyNow()">Buy</button>
  </div>

  <div class="card">
    <div class="tag">Popular</div>
    <div class="title">1 Month</div>
    <div class="features">30 days access</div>
    <div class="price">$10</div>
    <button class="btn" onclick="buyNow()">Buy</button>
  </div>

  <div class="card">
    <div class="tag">Best</div>
    <div class="title">Lifetime</div>
    <div class="features">Forever access</div>
    <div class="price">$20</div>
    <button class="btn" onclick="buyNow()">Buy</button>
  </div>

</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Login Popup -->
<div id="loginPopup" class="popup">
  <h3>Login</h3>
  <input type="text" placeholder="Username"><br>
  <input type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<script>
  let loggedIn = localStorage.getItem("loggedIn");

  const glow = document.getElementById('glow');
  document.addEventListener('mousemove', (e) => {
    glow.style.left = e.clientX + 'px';
    glow.style.top = e.clientY + 'px';
  });

  function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.classList.add("show");

    setTimeout(() => {
      toast.classList.remove("show");
    }, 1500);
  }

  function openLogin() {
    document.getElementById("loginPopup").classList.add("show");
  }

  function login() {
    localStorage.setItem("loggedIn", "true");
    document.getElementById("loginPopup").classList.remove("show");
    showToast("Logged in!");
  }

  function buyNow() {
    if (!localStorage.getItem("loggedIn")) {
      showToast("You need to login to buy first!");
      return;
    }

    showToast("Redirecting to Discord...");
    setTimeout(() => {
      window.location.href = "https://discord.gg/2Nqb9ASA";
    }, 1200);
  }
</script>

</body>
</html>
